<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lockora</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="app">
      <!-- ── Screen: Sign In ── -->
      <div id="screen-signin" class="screen hidden">
        <div class="header">
          <div class="brand">
            <svg
              class="brand-icon"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
              <path d="M9 12l2 2 4-4" />
            </svg>
            <span class="brand-name">Lockora</span>
          </div>
          <p class="header-sub">Sign in to your vault</p>
        </div>

        <!-- Google Sign-In Button -->
        <div class="google-section">
          <button type="button" id="btn-google-signin" class="btn-google">
            <svg class="google-icon" width="16" height="16" viewBox="0 0 24 24">
              <path
                fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              />
              <path
                fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              />
              <path
                fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              />
              <path
                fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              />
            </svg>
            <span id="google-signin-text">Continue with Google</span>
          </button>
          <div id="google-err" class="error hidden"></div>
        </div>

        <!-- Divider -->
        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">or</span>
          <div class="divider-line"></div>
        </div>

        <form id="form-signin">
          <div class="field">
            <label>Email</label>
            <input
              type="email"
              id="input-email"
              placeholder="you@example.com"
              required
              autocomplete="off"
            />
          </div>
          <div class="field">
            <label>Account password</label>
            <div class="input-wrap">
              <input
                type="password"
                id="input-password"
                placeholder="••••••••"
                required
              />
              <button
                type="button"
                class="eye-btn"
                data-target="input-password"
              >
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="eye-open"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>
          <div class="field">
            <label>Master password</label>
            <div class="input-wrap">
              <input
                type="password"
                id="input-master"
                placeholder="••••••••"
                required
              />
              <button type="button" class="eye-btn" data-target="input-master">
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="eye-open"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>
          <div id="signin-err" class="error hidden"></div>
          <button type="submit" id="btn-signin" class="btn-primary">
            Unlock vault
          </button>
        </form>

        <!-- Create Account -->
        <div class="create-account">
          <span>Don't have an account?</span>
          <a href="#" id="btn-create-account" class="create-link"
            >Create one →</a
          >
        </div>
      </div>

      <!-- ── Screen: Unlock (session exists but key lost after SW restart) ── -->
      <div id="screen-unlock" class="screen hidden">
        <div class="header">
          <div class="brand">
            <svg
              class="brand-icon"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
              <path d="M9 12l2 2 4-4" />
            </svg>
            <span class="brand-name">Lockora</span>
          </div>
          <p class="header-sub" id="unlock-email">Re-enter master password</p>
        </div>

        <form id="form-unlock">
          <div class="field">
            <label>Master password</label>
            <div class="input-wrap">
              <input
                type="password"
                id="input-unlock-master"
                placeholder="••••••••"
                required
              />
              <button
                type="button"
                class="eye-btn"
                data-target="input-unlock-master"
              >
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="eye-open"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <!-- Confirm password (shown for new users) -->
          <div class="field hidden" id="confirm-field">
            <label>Confirm master password</label>
            <div class="input-wrap">
              <input
                type="password"
                id="input-unlock-confirm"
                placeholder="••••••••"
                required
              />
              <button
                type="button"
                class="eye-btn"
                data-target="input-unlock-confirm"
              >
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="eye-open"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <!-- Password hint (shown for new users) -->
          <div class="field hidden" id="hint-field">
            <label>Password hint (optional)</label>
            <input
              type="text"
              id="input-unlock-hint"
              placeholder="e.g., Favorite pet's name"
              maxlength="100"
            />
          </div>

          <div id="unlock-err" class="error hidden"></div>

          <!-- Master password hint (shown after failed attempts) -->
          <div id="hint-container" class="hint-box hidden">
            <svg
              width="13"
              height="13"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="16" x2="12" y2="12" />
              <line x1="12" y1="8" x2="12.01" y2="8" />
            </svg>
            <div>
              <div class="hint-label">Your hint</div>
              <div id="hint-text" class="hint-value"></div>
            </div>
          </div>

          <button type="submit" id="btn-unlock" class="btn-primary">
            Unlock
          </button>
          <button type="button" id="btn-switch-account" class="btn-ghost">
            Use different account
          </button>
        </form>
      </div>

      <!-- ── Screen: Vault (main popup) ── -->
      <div id="screen-vault" class="screen hidden">
        <div class="top-bar">
          <div class="brand small">
            <svg
              class="brand-icon"
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
              <path d="M9 12l2 2 4-4" />
            </svg>
            <span class="brand-name">Lockora</span>
          </div>
          <button id="btn-signout" class="signout-btn" title="Sign out">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
          </button>
        </div>

        <!-- Current site info -->
        <div id="site-banner" class="site-banner hidden">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="2" y1="12" x2="22" y2="12" />
            <path
              d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"
            />
          </svg>
          <span id="site-domain"></span>
        </div>

        <!-- Loading -->
        <div id="vault-loading" class="loading-state">
          <div class="spinner"></div>
          <span>Searching vault…</span>
        </div>

        <!-- Matches found -->
        <div id="vault-matches" class="hidden">
          <div class="section-title" id="matches-label"></div>
          <div id="matches-list"></div>
        </div>

        <!-- No matches -->
        <div id="vault-empty" class="empty-state hidden">
          <div class="empty-icon">🔍</div>
          <div class="empty-text">No matching credentials</div>
          <div class="empty-sub" id="empty-domain"></div>
        </div>

        <!-- No form detected -->
        <div id="vault-noform" class="empty-state hidden">
          <div class="empty-icon">📄</div>
          <div class="empty-text">No login form detected</div>
          <div class="empty-sub">Navigate to a site with a login form</div>
        </div>

        <!-- Open web app link -->
        <div class="footer">
          <a id="open-webapp" class="webapp-link">Open Lockora vault →</a>
        </div>
      </div>

      <!-- ── Screen: Loading ── -->
      <div id="screen-loading" class="screen">
        <div class="loading-full">
          <div class="spinner"></div>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
